name: Release

# 推 git tag v* 时触发；也支持去 Actions 页面手动按钮（调试用）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，例如 3.6）'
        required: true
        type: string

permissions:
  contents: write   # 创建 Release / 上传 asset 需要

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # 拿到 tag annotation 内容用于 release notes

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $ver = '${{ github.ref_name }}'.TrimStart('v')
          } else {
            $ver = '${{ inputs.version }}'
          }
          if (-not $ver) { throw "version is empty" }
          Write-Host "Building version: $ver"
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          # 覆盖 version.py，让 main.py 和 updater.py 都用 CI 版本号
          $content = @"
          # -*- coding: utf-8 -*-
          # 由 GitHub Actions 自动覆盖；本地开发请参考 version.py 原始内容
          __version__ = "$ver"
          "@
          Set-Content -Path version.py -Value $content -Encoding utf8

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build (PyInstaller onedir)
        run: python build.py onedir

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          # Inno Setup 6 在 windows-latest 镜像中预装，iscc 通常已在 PATH
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = (Get-Command iscc -ErrorAction SilentlyContinue).Source
          }
          if (-not $iscc) { throw "ISCC.exe not found — Inno Setup not installed on runner" }
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" installer.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compile failed: $LASTEXITCODE" }

      - name: Assemble latest.json
        id: meta
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Web
          $ver = '${{ steps.ver.outputs.version }}'
          # ASCII 资产名：GitHub 会剥掉资产名里的中文，必须用 ASCII 名 URL 才稳定
          $exePath = "dist\mark123-Setup-v$ver.exe"
          if (-not (Test-Path $exePath)) { throw "Installer not found: $exePath" }

          $exeName = Split-Path $exePath -Leaf
          $exeNameUrl = [System.Web.HttpUtility]::UrlPathEncode($exeName)
          $sha = (Get-FileHash $exePath -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $exePath).Length
          $now = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          # tag annotation 作为 release notes 的主体
          # Windows runner 上 PowerShell 默认用 GBK/Win1252 读子进程 stdout，
          # git 输出 UTF-8 会被解码错位。强制 UTF-8 读取避免中文乱码
          $tag = '${{ github.ref_name }}'
          $notes = ""
          if ('${{ github.event_name }}' -eq 'push') {
            $prevEnc = [Console]::OutputEncoding
            [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
            try {
              $notes = git for-each-ref "refs/tags/$tag" --format='%(contents)' 2>$null
              $notes = $notes.Trim()
            } finally {
              [Console]::OutputEncoding = $prevEnc
            }
          }
          if (-not $notes) { $notes = "查看 https://github.com/${{ github.repository }}/releases/tag/v$ver" }

          # 单源分发：安装包与 latest.json 都发布在 GitHub Releases（HTTPS，全球可达）。
          #   url / url_github 均指向 GitHub Releases 直链；updater.py 用其中的 sha256 强制校验。
          # （历史上曾用自建 VPS 双源加速，VPS 下线后改为纯 GitHub。）
          $ghBase = "https://github.com/${{ github.repository }}/releases/download/v$ver"

          $latest = [ordered]@{
            version     = $ver
            url         = "$ghBase/$exeNameUrl"
            url_github  = "$ghBase/$exeNameUrl"
            sha256      = $sha
            size        = $size
            notes       = $notes
            released_at = $now
          }
          $latest | ConvertTo-Json -Depth 5 | Set-Content -Path "dist\latest.json" -Encoding utf8

          Get-Content "dist\latest.json"
          "exe_path=$exePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: 专利标记助手 V${{ steps.ver.outputs.version }}
          files: |
            ${{ steps.meta.outputs.exe_path }}
            dist/latest.json
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v6
        with:
          name: installer-v${{ steps.ver.outputs.version }}
          path: |
            ${{ steps.meta.outputs.exe_path }}
            dist/latest.json
          retention-days: 30
